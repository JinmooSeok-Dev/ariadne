<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ariadne — System Topology</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; }

    #header {
      padding: 12px 24px;
      background: #16213e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #header h1 { font-size: 18px; color: #e94560; }
    #header .hostname { color: #999; font-size: 14px; }
    #header button {
      margin-left: auto;
      padding: 6px 16px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #header button:hover { background: #c73e54; }

    #main { display: flex; height: calc(100vh - 48px); }

    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #sidebar {
      width: 360px;
      background: #16213e;
      border-left: 1px solid #333;
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    #sidebar.active { display: block; }
    #sidebar h2 { font-size: 15px; color: #e94560; margin-bottom: 12px; }
    #sidebar .field { margin-bottom: 8px; }
    #sidebar .label { color: #888; font-size: 12px; }
    #sidebar .value { color: #eee; font-size: 14px; }
    #sidebar table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    #sidebar th, #sidebar td {
      padding: 6px 8px;
      text-align: left;
      font-size: 12px;
      border-bottom: 1px solid #333;
    }
    #sidebar th { color: #888; }
    #sidebar .bottleneck { color: #e94560; font-weight: bold; }

    #trace-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #16213e;
      border-top: 1px solid #333;
      padding: 16px 24px;
      display: none;
      max-height: 40vh;
      overflow-y: auto;
    }
    #trace-panel.active { display: block; }
    #trace-panel h3 { font-size: 14px; color: #e94560; margin-bottom: 8px; }

    .node-label {
      font-size: 11px;
      fill: #ccc;
      pointer-events: none;
    }
    .link { stroke-opacity: 0.6; }
    .link-label { font-size: 9px; fill: #888; }

    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(22, 33, 62, 0.9);
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
    }
    #legend .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    #legend .dot { width: 12px; height: 12px; border-radius: 50%; }

    .tooltip {
      position: absolute;
      background: #16213e;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 100;
    }

    .trace-path { stroke: #e94560 !important; stroke-opacity: 1 !important; stroke-width: 4 !important; }
    .node-selected { stroke: #e94560; stroke-width: 3; }

    #instructions {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22, 33, 62, 0.9);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Ariadne</h1>
    <span class="hostname" id="hostname"></span>
    <button onclick="reloadTopology()">Reload</button>
  </div>

  <div id="main">
    <div id="graph-container">
      <svg id="graph"></svg>
      <div id="instructions">Click a node to inspect · Click two nodes to trace path · Scroll to zoom</div>
      <div id="legend"></div>
      <div class="tooltip" id="tooltip"></div>
      <div id="trace-panel"></div>
    </div>
    <div id="sidebar"></div>
  </div>

  <script>
    const TYPE_COLORS = {
      numa_node: '#f0c040',
      socket: '#4ecdc4',
      pcie_root_complex: '#e94560',
      pcie_root_port: '#a855f7',
      gpu: '#22c55e',
      npu: '#06b6d4',
      nic: '#8b5cf6',
      nvme: '#f59e0b',
      pcie_endpoint: '#6b7280',
      memory_controller: '#3b82f6',
    };

    const TYPE_LABELS = {
      numa_node: 'NUMA Node',
      socket: 'Socket',
      pcie_root_complex: 'Root Complex',
      pcie_root_port: 'Root Port',
      gpu: 'GPU',
      npu: 'NPU',
      nic: 'NIC',
      nvme: 'NVMe',
      pcie_endpoint: 'Endpoint',
      memory_controller: 'Mem Ctrl',
    };

    const NODE_SIZES = {
      numa_node: 28,
      socket: 22,
      pcie_root_complex: 24,
      pcie_root_port: 10,
      gpu: 20,
      npu: 20,
      nic: 18,
      nvme: 16,
      pcie_endpoint: 12,
      memory_controller: 16,
    };

    let graphData = null;
    let selectedNodes = [];
    let simulation = null;

    async function loadTopology() {
      const resp = await fetch('/api/topology/graph');
      graphData = await resp.json();

      const topoResp = await fetch('/api/topology');
      const topo = await topoResp.json();
      document.getElementById('hostname').textContent = topo.hostname;

      renderGraph(graphData);
      renderLegend();
    }

    function renderGraph(data) {
      const container = document.getElementById('graph-container');
      const width = container.clientWidth;
      const height = container.clientHeight;

      d3.select('#graph').selectAll('*').remove();

      const svg = d3.select('#graph')
        .attr('width', width)
        .attr('height', height);

      const g = svg.append('g');

      const zoom = d3.zoom()
        .scaleExtent([0.1, 4])
        .on('zoom', (event) => g.attr('transform', event.transform));
      svg.call(zoom);

      simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.links).id(d => d.id).distance(d => {
          if (d.type === 'pcie') return 120;
          if (d.type === 'internal') return 80;
          return 100;
        }))
        .force('charge', d3.forceManyBody().strength(-400))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => (NODE_SIZES[d.type] || 12) + 10));

      const link = g.append('g')
        .selectAll('line')
        .data(data.links)
        .join('line')
        .attr('class', 'link')
        .attr('stroke', d => d.type === 'pcie' ? '#e94560' : '#444')
        .attr('stroke-width', d => {
          if (!d.bandwidth_gbps) return 1;
          return Math.max(1, Math.min(6, d.bandwidth_gbps / 5));
        })
        .attr('stroke-dasharray', d => d.type === 'internal' ? '4,4' : null);

      const linkLabel = g.append('g')
        .selectAll('text')
        .data(data.links.filter(d => d.bandwidth_gbps))
        .join('text')
        .attr('class', 'link-label')
        .text(d => `${d.bandwidth_gbps} GB/s`);

      const node = g.append('g')
        .selectAll('g')
        .data(data.nodes)
        .join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', dragstarted)
          .on('drag', dragged)
          .on('end', dragended));

      node.append('circle')
        .attr('r', d => NODE_SIZES[d.type] || 12)
        .attr('fill', d => TYPE_COLORS[d.type] || '#666')
        .attr('stroke', '#fff')
        .attr('stroke-width', 1.5)
        .attr('opacity', 0.9);

      node.append('text')
        .attr('class', 'node-label')
        .attr('dy', d => (NODE_SIZES[d.type] || 12) + 14)
        .attr('text-anchor', 'middle')
        .text(d => {
          if (d.type === 'pcie_root_port') return '';
          return d.name.length > 25 ? d.name.slice(0, 22) + '...' : d.name;
        });

      node.on('click', (event, d) => {
        event.stopPropagation();
        handleNodeClick(d, node, link);
      });

      node.on('mouseover', (event, d) => showTooltip(event, d));
      node.on('mouseout', () => hideTooltip());

      svg.on('click', () => {
        clearSelection(node, link);
      });

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);

        linkLabel
          .attr('x', d => (d.source.x + d.target.x) / 2)
          .attr('y', d => (d.source.y + d.target.y) / 2);

        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    function handleNodeClick(d, nodeSelection, linkSelection) {
      selectedNodes.push(d);

      if (selectedNodes.length === 1) {
        showNodeInfo(d);
        nodeSelection.selectAll('circle')
          .classed('node-selected', n => n.id === d.id);
      }

      if (selectedNodes.length === 2) {
        const src = selectedNodes[0];
        const dst = selectedNodes[1];
        selectedNodes = [];
        tracePath(src.id, dst.id, nodeSelection, linkSelection);
      }
    }

    async function tracePath(sourceId, destId, nodeSelection, linkSelection) {
      const resp = await fetch(`/api/trace?source=${sourceId}&destination=${destId}`);
      const result = await resp.json();

      linkSelection.classed('trace-path', false);
      nodeSelection.selectAll('circle').classed('node-selected', false);

      if (result.path && result.path.length > 1) {
        const pathSet = new Set(result.path);
        nodeSelection.selectAll('circle')
          .classed('node-selected', n => pathSet.has(n.id));

        const pathEdges = new Set();
        for (let i = 0; i < result.path.length - 1; i++) {
          pathEdges.add(`${result.path[i]}-${result.path[i+1]}`);
          pathEdges.add(`${result.path[i+1]}-${result.path[i]}`);
        }
        linkSelection.classed('trace-path', l =>
          pathEdges.has(`${l.source.id}-${l.target.id}`)
        );
      }

      showTraceResult(result);
    }

    function showNodeInfo(d) {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.add('active');

      let html = `<h2>${d.name}</h2>`;
      html += `<div class="field"><span class="label">Type</span><br><span class="value">${TYPE_LABELS[d.type] || d.type}</span></div>`;
      html += `<div class="field"><span class="label">ID</span><br><span class="value">${d.id}</span></div>`;

      if (d.attrs) {
        const keys = Object.keys(d.attrs);
        for (const key of keys) {
          const val = d.attrs[key];
          if (val === null || val === undefined || val === '') continue;
          html += `<div class="field"><span class="label">${key}</span><br><span class="value">${JSON.stringify(val)}</span></div>`;
        }
      }

      html += `<br><p style="color:#666;font-size:11px;">Click another node to trace path</p>`;
      sidebar.innerHTML = html;
    }

    function showTraceResult(result) {
      const panel = document.getElementById('trace-panel');
      panel.classList.add('active');

      let html = `<h3>Flow: ${result.source_name} → ${result.destination_name}</h3>`;

      if (result.segments && result.segments.length > 0) {
        html += '<table><tr><th>Segment</th><th>Theoretical BW</th><th>Effective BW</th><th>Latency</th></tr>';
        for (const seg of result.segments) {
          const theoBw = seg.theoretical_bw_gbps ? `${seg.theoretical_bw_gbps} GB/s` : 'internal';
          const effBw = seg.effective_bw_gbps ? `${seg.effective_bw_gbps} GB/s` : '—';
          html += `<tr><td>${seg.from_name} → ${seg.to_name}</td><td>${theoBw}</td><td>${effBw}</td><td>${seg.latency_ns}ns</td></tr>`;
        }
        html += `<tr style="border-top:2px solid #555"><td><strong>E2E</strong></td><td></td><td><strong>${result.e2e_bandwidth_gbps} GB/s</strong></td><td><strong>${result.e2e_latency_ns}ns</strong></td></tr>`;
        if (result.bottleneck) {
          html += `<tr><td class="bottleneck">Bottleneck</td><td colspan="3" class="bottleneck">${result.bottleneck}</td></tr>`;
        }
        html += '</table>';

        html += result.same_numa
          ? '<p style="color:#22c55e;margin-top:8px;">✅ same-NUMA</p>'
          : '<p style="color:#f59e0b;margin-top:8px;">⚠️ cross-NUMA</p>';
      } else {
        html += '<p style="color:#e94560;">No path found</p>';
      }

      panel.innerHTML = html;

      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('active');
    }

    function clearSelection(nodeSelection, linkSelection) {
      selectedNodes = [];
      nodeSelection.selectAll('circle').classed('node-selected', false);
      linkSelection.classed('trace-path', false);
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('trace-panel').classList.remove('active');
    }

    function showTooltip(event, d) {
      const tooltip = document.getElementById('tooltip');
      let text = `<strong>${d.name}</strong><br>${TYPE_LABELS[d.type] || d.type}`;
      if (d.attrs?.bandwidth_gbps) text += `<br>${d.attrs.bandwidth_gbps} GB/s`;
      if (d.attrs?.iommu_group >= 0) text += `<br>IOMMU: ${d.attrs.iommu_group}`;
      if (d.attrs?.bdf) text += `<br>${d.attrs.bdf}`;
      tooltip.innerHTML = text;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.pageX + 12) + 'px';
      tooltip.style.top = (event.pageY - 12) + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      const types = ['numa_node', 'socket', 'memory_controller', 'pcie_root_complex', 'gpu', 'npu', 'nvme', 'nic'];
      let html = '';
      for (const t of types) {
        html += `<div class="item"><div class="dot" style="background:${TYPE_COLORS[t]}"></div>${TYPE_LABELS[t]}</div>`;
      }
      legend.innerHTML = html;
    }

    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    }
    function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }

    async function reloadTopology() {
      await fetch('/api/topology/reload', { method: 'POST' });
      await loadTopology();
    }

    loadTopology();
  </script>
</body>
</html>
