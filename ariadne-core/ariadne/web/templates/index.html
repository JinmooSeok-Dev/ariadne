<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ariadne</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="header">
  <h1>Ariadne</h1>
  <span class="info" id="hinfo"></span>
  <div class="spacer"></div>
  <input type="text" id="search" placeholder="Search device..." oninput="searchDev(this.value)">
  <button class="btn btn-gray hidden" id="bclear" onclick="clearSel()">Clear (ESC)</button>
  <button class="btn btn-gray" onclick="location.reload()">Reload</button>
</div>
<div id="sel-bar"><span id="sel-text"></span></div>

<div id="main">
  <div id="tree-panel">
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <span id="zoom-level">100%</span>
      <button class="zoom-btn" onclick="zoomFit()" style="font-size:10px;width:auto;padding:0 8px;">Fit</button>
    </div>
    <div id="tree-content" style="position:relative;">
      <svg id="edge-svg"></svg>
      <div id="tree-nodes"></div>
    </div>
  </div>
  <div id="sb-toggle" onclick="toggleSidebar()">▶</div>
  <div id="sidebar">
    <div id="sb-resize"></div>
    <div class="tabs">
      <div class="tab on" onclick="showTab('trace')">Trace</div>
      <div class="tab" onclick="showTab('info')">Info</div>
      <div class="tab" onclick="showTab('history')">History</div>
    </div>
    <div id="sb">
      <div class="empty">
        Click a device to set as <span class="text-source">Source</span><br>
        then click another as <span class="text-dest">Destination</span><br><br>
        Right-click for quick options<br>
        <span class="text-muted">ESC to clear · Search to find</span>
      </div>
    </div>
  </div>
</div>

<div id="ctx">
  <div class="ctx-i" onclick="ctxDo('src')">🟢 Set as Source</div>
  <div class="ctx-i" onclick="ctxDo('dst')">🟡 Set as Destination</div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="ctxDo('mem')">📦 Trace to Memory</div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="ctxDo('swap')">🔄 Swap Source ↔ Dest</div>
  <div class="ctx-i" onclick="ctxDo('info')">ℹ️ Device Info</div>
</div>

<script src="/static/core.js"></script>
<script src="/static/ui.js"></script>
</body>
</html>
