<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ariadne</title>
  <style>
    :root {
      --child-indent: 60px;
      --child-gap: 2px;
      --child-pad: 4px;
      --node-min-w: 160px;
      --edge-w: 2.5px;
      --edge-pcie-w: 3px;
      --edge-hl-w: 4px;
      --edge-seg-w: 5px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f0f1a; color:#eee; overflow:hidden; }

    #header { height:40px; padding:0 16px; background:#1a1a2e; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px; }
    #header h1 { font-size:15px; color:#e94560; }
    .info { color:#666; font-size:11px; }
    .spacer { flex:1; }
    .btn { padding:4px 12px; border-radius:4px; font-size:11px; cursor:pointer; border:none; font-weight:bold; }
    .btn-gray { background:#333; color:#ccc; }
    #search { padding:4px 8px; border-radius:4px; border:1px solid #444; background:#0f0f1a; color:#ddd; font-size:11px; width:160px; outline:none; }
    #search:focus { border-color:#e94560; }
    #search::placeholder { color:#555; }

    #main { display:flex; height:calc(100vh - 40px); }

    /* Tree */
    #tree-panel { flex:1; overflow:auto; padding:20px; position:relative; }
    #tree-content { transform-origin:0 0; transition:transform 0.1s ease; }
    #zoom-controls { position:absolute; top:8px; right:8px; z-index:5; display:flex; gap:4px; }
    .zoom-btn { width:32px; height:28px; border:1px solid #444; border-radius:4px; background:#1a1a2e; color:#ccc; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .zoom-btn:hover { background:#333; }
    #zoom-level { font-size:10px; color:#888; padding:0 6px; line-height:28px; }

    .htree { display:flex; align-items:center; }
    .htree-node {
      display:inline-flex; align-items:center; gap:4px;
      padding:5px 10px; border-radius:5px; cursor:pointer;
      white-space:nowrap; font-size:11px;
      border:1.5px solid transparent; flex-shrink:0; min-width:var(--node-min-w);
    }
    .htree-node:hover { filter:brightness(1.3); }
    .htree-node.src-sel { border-color:#22c55e !important; box-shadow:0 0 8px rgba(34,197,94,0.3); }
    .htree-node.dst-sel { border-color:#f59e0b !important; box-shadow:0 0 8px rgba(245,158,11,0.3); }
    .htree-node.on-path { border-color:#e94560 !important; }
    .htree-node.search-hl { box-shadow:0 0 10px rgba(233,69,96,0.5); filter:brightness(1.4); }
    .htree-node.search-dim { opacity:0.3; }

    .htree-toggle { font-size:9px; color:#aaa; cursor:pointer; width:14px; text-align:center; flex-shrink:0; user-select:none; }
    .htree-toggle:hover { color:#fff; }
    .htree-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
    .htree-count { font-size:8px; color:#fff; background:#e94560; padding:0 5px; border-radius:8px; margin-left:4px; }
    .htree-label { font-weight:500; }
    .htree-badge { font-size:8px; color:#ccc; background:rgba(255,255,255,0.08); padding:1px 5px; border-radius:3px; }
    .htree-bw { font-size:8px; color:#22d3ee; font-weight:bold; }
    .htree-iommu { font-size:8px; color:#fbbf24; font-weight:bold; }
    .htree-children { display:flex; flex-direction:column; padding:var(--child-pad,4px) 0 var(--child-pad,4px) var(--child-indent,60px); gap:var(--child-gap,2px); }
    .htree-children.folded { display:none; }
    .htree-child { padding:2px 0; }

    /* SVG edges */
    #edge-svg { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
    .edge-line { stroke:#666; stroke-width:2; fill:none; }
    .edge-line.pcie { stroke:#4a9eff; stroke-width:2.5; }
    .edge-line.internal { stroke:#666; stroke-dasharray:6,4; }
    .edge-line.trace-hl { stroke:#e94560 !important; stroke-width:5 !important; stroke-dasharray:none !important; filter:drop-shadow(0 0 3px #e94560); }
    .edge-line.seg-hl { stroke:#fff !important; stroke-width:5 !important; stroke-dasharray:none !important; }
    .edge-line:hover { stroke-width:5; stroke:#fff; }
    .edge-bw { font-size:9px; fill:#22d3ee; font-weight:bold; pointer-events:none; opacity:0; transition:opacity 0.15s; }
    .edge-bg { pointer-events:none; opacity:0; transition:opacity 0.15s; }
    .edge-group:hover .edge-bw, .edge-group:hover .edge-bg { opacity:1; }

    /* Context menu */
    #ctx { position:absolute; background:#1a1a2e; border:1px solid #444; border-radius:6px; padding:4px 0; display:none; z-index:50; min-width:200px; box-shadow:0 4px 16px rgba(0,0,0,0.6); }
    .ctx-i { padding:7px 14px; font-size:12px; cursor:pointer; color:#ddd; }
    .ctx-i:hover { background:rgba(233,69,96,0.15); }
    .ctx-sep { border-top:1px solid #333; margin:2px 0; }

    /* Sidebar */
    #sidebar { width:380px; background:#1a1a2e; border-left:1px solid #333; display:flex; flex-direction:column; }
    .tabs { display:flex; border-bottom:1px solid #333; }
    .tab { flex:1; padding:8px; text-align:center; font-size:11px; cursor:pointer; color:#666; border-bottom:2px solid transparent; font-weight:bold; }
    .tab.on { color:#e94560; border-bottom-color:#e94560; }
    #sb { flex:1; overflow-y:auto; padding:12px; }
    .section { margin-bottom:14px; }
    .stitle { font-size:11px; color:#e94560; font-weight:bold; margin-bottom:6px; border-bottom:1px solid #222; padding-bottom:3px; }
    .field { margin-bottom:3px; }
    .flabel { font-size:9px; color:#666; }
    .fval { font-size:11px; color:#ddd; }
    .cards { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
    .card { flex:1; min-width:70px; background:#0f0f1a; border:1px solid #222; border-radius:5px; padding:6px; text-align:center; }
    .card-l { font-size:8px; color:#666; text-transform:uppercase; }
    .card-v { font-size:16px; font-weight:bold; color:#06b6d4; }
    .pnode { font-size:10px; padding:4px 8px; background:#0f0f1a; border-left:3px solid #444; border-radius:0 3px 3px 0; margin:1px 0; cursor:pointer; }
    .pnode:hover { background:#1a1a2e; }
    .pnode.src { border-left-color:#22c55e; }
    .pnode.dst { border-left-color:#f59e0b; }
    .plink { font-size:9px; color:#777; padding:1px 0 1px 14px; border-left:1px dashed #333; margin-left:4px; cursor:pointer; }
    .plink:hover { color:#fff; }
    .tbl { width:100%; border-collapse:collapse; font-size:10px; }
    .tbl th { color:#666; font-size:8px; text-transform:uppercase; padding:3px 4px; text-align:left; border-bottom:1px solid #333; }
    .tbl td { padding:3px 4px; border-bottom:1px solid #1a1a2e; }
    .tbl tr:hover { background:rgba(233,69,96,0.08); cursor:pointer; }
    .tbl tr.hl { background:rgba(255,255,255,0.06); }
    .hist { padding:6px 8px; border-radius:3px; font-size:10px; cursor:pointer; margin:2px 0; display:flex; justify-content:space-between; background:#0f0f1a; border-left:3px solid #333; }
    .hist:hover { border-left-color:#e94560; background:#1a1a2e; }
    #sel-bar { position:fixed; top:48px; left:50%; transform:translateX(-50%); background:rgba(20,20,40,0.95); padding:6px 14px; border-radius:6px; font-size:12px; z-index:5; display:none; }
    .empty { color:#999; font-size:12px; padding:20px; text-align:center; line-height:1.8; }
  </style>
</head>
<body>
<div id="header">
  <h1>Ariadne</h1>
  <span class="info" id="hinfo"></span>
  <div class="spacer"></div>
  <input type="text" id="search" placeholder="Search device..." oninput="searchDev(this.value)">
  <button class="btn btn-gray" id="bclear" style="display:none" onclick="clearSel()">Clear (ESC)</button>
  <button class="btn btn-gray" onclick="location.reload()">Reload</button>
</div>
<div id="sel-bar"><span id="sel-text"></span></div>

<div id="main">
  <div id="tree-panel">
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <span id="zoom-level">100%</span>
      <button class="zoom-btn" onclick="zoomFit()" style="font-size:10px;width:auto;padding:0 8px;">Fit</button>
    </div>
    <div id="tree-content" style="position:relative;">
      <svg id="edge-svg"></svg>
      <div id="tree-nodes"></div>
    </div>
  </div>
  <div id="sidebar">
    <div class="tabs">
      <div class="tab on" onclick="showTab('trace')">Trace</div>
      <div class="tab" onclick="showTab('info')">Info</div>
      <div class="tab" onclick="showTab('history')">History</div>
    </div>
    <div id="sb">
      <div class="empty">
        Click a device to set as <span style="color:#22c55e">Source</span><br>
        then click another as <span style="color:#f59e0b">Destination</span><br><br>
        Right-click for quick options<br>
        <span style="color:#666">ESC to clear · Search to find</span>
      </div>
    </div>
  </div>
</div>

<div id="ctx">
  <div class="ctx-i" onclick="ctxDo('src')">🟢 Set as Source</div>
  <div class="ctx-i" onclick="ctxDo('dst')">🟡 Set as Destination</div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="ctxDo('mem')">📦 Trace to Memory</div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="ctxDo('swap')">🔄 Swap Source ↔ Dest</div>
  <div class="ctx-i" onclick="ctxDo('info')">ℹ️ Device Info</div>
</div>

<script>
const COLORS = {
  numa_node:'#f0c040', socket:'#4ecdc4', memory_controller:'#3b82f6',
  pcie_root_complex:'#e94560', pcie_root_port:'#7c3aed',
  gpu:'#22c55e', npu:'#06b6d4', nic:'#a855f7', nvme:'#f59e0b', pcie_endpoint:'#6b7280',
};
const TRACEABLE = new Set(['gpu','npu','nvme','nic','memory_controller','pcie_endpoint']);

// 레이아웃 상수 — 여기서 한번에 변경 가능
const LAYOUT = {
  childIndent: 60,       // 자식 노드 들여쓰기 (px)
  childGap: 2,           // 자식 간 세로 간격 (px)
  childPadding: 4,       // children 컨테이너 세로 패딩 (px)
  nodeMinWidth: 160,     // 노드 최소 너비 (px)
  nodePadding: '5px 10px',
  nodeFontSize: '11px',
  edgeWidth: 2.5,        // 기본 edge 두께
  edgePcieWidth: 3,      // PCIe edge 두께
  edgeHlWidth: 4,        // 하이라이트 edge 두께
  edgeSegHlWidth: 5,     // 세그먼트 hover 하이라이트 두께
  bwFontSize: '8px',     // BW 라벨 크기
  bwLabelOffset: 4,      // BW 라벨 edge에서 오프셋
};

let graph=null, topo=null, nodeMap={}, childrenOf={};
let srcId=null, dstId=null, hist=[], ctxNodeId=null, lastTrace=null;

// Edge 데이터 모델: id → { source, target, type, bandwidth_gbps, latency_ns, ... }
let edgeMap = {};

async function init() {
  [graph, topo] = await Promise.all([
    fetch('/api/topology/graph').then(r=>r.json()),
    fetch('/api/topology').then(r=>r.json()),
  ]);
  document.getElementById('hinfo').textContent =
    `${topo.hostname} · ${topo.numa_nodes.length} NUMA · ${topo.cpu_cores.length} cores · ${topo.pci_devices.length} PCI`;

  nodeMap = {};
  graph.nodes.forEach(n => nodeMap[n.data.id] = n.data);
  childrenOf = {};
  graph.edges.forEach(e => {
    if (!childrenOf[e.data.source]) childrenOf[e.data.source] = [];
    childrenOf[e.data.source].push(e.data);
  });

  renderTree();
  document.addEventListener('keydown', e => { if(e.key==='Escape'){clearSel();hideCtx();} });
  document.addEventListener('click', () => hideCtx());
}

function renderTree() {
  const hasParent = new Set();
  graph.edges.forEach(e => hasParent.add(e.data.target));
  const roots = graph.nodes.filter(n => !hasParent.has(n.data.id)).map(n => n.data.id);
  let html = '';
  roots.forEach(r => { html += buildNode(r); });
  document.getElementById('tree-nodes').innerHTML = html;

  // 노드 배치 후 SVG edge 그리기
  requestAnimationFrame(() => drawEdges());
  zoomFit();
}

function buildNode(id) {
  const node = nodeMap[id];
  if (!node) return '';
  const kids = childrenOf[id] || [];
  const color = COLORS[node.type] || '#666';
  const nid = esc(id);

  let badges = '';
  if (node.link) badges += `<span class="htree-badge">${node.link}</span>`;
  if (node.iommu_group >= 0) badges += `<span class="htree-iommu">G${node.iommu_group}</span>`;
  if (node.sriov_totalvfs > 0) badges += `<span class="htree-badge">VF:${node.sriov_numvfs||0}/${node.sriov_totalvfs}</span>`;
  if (node.memory_mb) badges += `<span class="htree-badge">${Math.round(node.memory_mb/1024)}GB</span>`;
  if (node.cpu_count) badges += `<span class="htree-badge">${node.cpu_count}CPU</span>`;

  const cnt = countDesc(id);
  const chId = `ch_${nid}`, coId = `co_${nid}`;

  let h = `<div class="htree">`;
  h += `<div class="htree-node" id="n_${nid}" data-id="${id}" style="background:${color}22;border-color:${color}44" onclick="clickNode('${id}')" oncontextmenu="showCtx(event,'${id}')">`;
  if (kids.length > 0) h += `<span class="htree-toggle" onclick="event.stopPropagation();fold('${chId}','${coId}',this)">▼</span>`;
  h += `<span class="htree-dot" style="background:${color}"></span>`;
  h += `<span class="htree-label">${node.label}</span>`;
  h += badges;
  if (kids.length > 0) h += `<span class="htree-count" id="ct_${nid}" style="display:none">${cnt}</span>`;
  h += `</div>`;

  if (kids.length > 0) {
    h += `<div class="htree-children" id="${chId}">`;
    kids.forEach(edge => {
      h += `<div class="htree-child">`;
      h += buildNode(edge.target);
      h += `</div>`;
    });
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function esc(id) { return id.replace(/[:.]/g, '_'); }

function drawEdges() {
  const svg = document.getElementById('edge-svg');
  const container = document.getElementById('tree-content');
  const rect = container.getBoundingClientRect();
  svg.setAttribute('width', container.scrollWidth);
  svg.setAttribute('height', container.scrollHeight);
  svg.innerHTML = '';

  edgeMap = {};

  graph.edges.forEach(e => {
    const srcEl = document.getElementById('n_' + esc(e.data.source));
    const tgtEl = document.getElementById('n_' + esc(e.data.target));
    if (!srcEl || !tgtEl) return;

    const sr = srcEl.getBoundingClientRect();
    const tr = tgtEl.getBoundingClientRect();
    const x1 = sr.right - rect.left;
    const y1 = sr.top + sr.height / 2 - rect.top;
    const x2 = tr.left - rect.left;
    const y2 = tr.top + tr.height / 2 - rect.top;
    const mx = (x1 + x2) / 2;

    const eId = `e_${esc(e.data.source)}_${esc(e.data.target)}`;
    const edgeType = e.data.type === 'internal' ? 'internal' : 'pcie';

    // Edge 데이터 등록
    edgeMap[eId] = {
      id: eId,
      source: e.data.source,
      target: e.data.target,
      type: edgeType,
      bandwidth_gbps: e.data.bandwidth_gbps || null,
      latency_ns: e.data.latency_ns || null,
      speed: e.data.speed || null,
      width: e.data.width || null,
      path: { x1, y1, x2, y2, mx },
    };

    // Edge 그룹 (path + label)
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'edge-group');
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => showEdgeDetail(eId));

    // 투명 히트 영역
    const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const pathD = `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`;
    hitPath.setAttribute('d', pathD);
    hitPath.setAttribute('stroke', 'transparent');
    hitPath.setAttribute('stroke-width', '16');
    hitPath.setAttribute('fill', 'none');
    hitPath.setAttribute('pointer-events', 'stroke');
    g.appendChild(hitPath);

    // 보이는 edge
    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', pathD);
    pathEl.setAttribute('class', `edge-line ${edgeType}`);
    pathEl.setAttribute('id', eId);
    g.appendChild(pathEl);

    // BW 라벨 — hover 시에만 표시, 배경 박스 포함
    if (e.data.bandwidth_gbps) {
      const labelX = mx + LAYOUT.bwLabelOffset;
      const labelY = (y1 + y2) / 2;
      // 배경
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', labelX - 2);
      bg.setAttribute('y', labelY - 8);
      bg.setAttribute('width', 32);
      bg.setAttribute('height', 14);
      bg.setAttribute('rx', 3);
      bg.setAttribute('fill', '#0f0f1a');
      bg.setAttribute('class', 'edge-bg');
      g.appendChild(bg);
      // 텍스트
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelX);
      text.setAttribute('y', labelY + 3);
      text.setAttribute('class', 'edge-bw');
      text.textContent = e.data.bandwidth_gbps;
      g.appendChild(text);
    }

    svg.appendChild(g);
  });
}

function showEdgeDetail(eId) {
  const edge = edgeMap[eId];
  if (!edge) return;
  const srcName = nodeMap[edge.source]?.label || edge.source;
  const tgtName = nodeMap[edge.target]?.label || edge.target;
  let h = `<div class="section"><div class="stitle">Edge: ${srcName} → ${tgtName}</div>`;
  h += `<div class="field"><span class="flabel">Type</span><br><span class="fval">${edge.type}</span></div>`;
  if (edge.bandwidth_gbps) h += `<div class="field"><span class="flabel">Bandwidth</span><br><span class="fval">${edge.bandwidth_gbps} GB/s</span></div>`;
  if (edge.latency_ns) h += `<div class="field"><span class="flabel">Latency</span><br><span class="fval">${edge.latency_ns} ns</span></div>`;
  if (edge.speed) h += `<div class="field"><span class="flabel">Speed</span><br><span class="fval">${edge.speed}</span></div>`;
  if (edge.width) h += `<div class="field"><span class="flabel">Width</span><br><span class="fval">x${edge.width}</span></div>`;
  h += '</div>';
  setSB(h); showTab('info');
}
function countDesc(id) { const k=childrenOf[id]||[]; let c=k.length; k.forEach(e=>{c+=countDesc(e.target);}); return c; }

function fold(chId, coId, el) {
  const ch = document.getElementById(chId);
  const co = document.getElementById(coId);
  if (!ch) return;
  const folding = !ch.classList.contains('folded');
  ch.classList.toggle('folded'); if(co) co.classList.toggle('folded');
  el.textContent = folding ? '▶' : '▼';
  const ct = document.getElementById(chId.replace('ch_','ct_'));
  if (ct) ct.style.display = folding ? 'inline' : 'none';
}

// === 입력 방식 ===
function clickNode(id) {
  const node = nodeMap[id];
  if (!node || !TRACEABLE.has(node.type)) { showInfo(node); showTab('info'); return; }
  pickNode(id);
}

function pickNode(id) {
  if (!srcId) {
    // 첫 선택 = source
    setSrc(id);
  } else if (!dstId) {
    if (id === srcId) return;
    // 두 번째 선택 = destination → trace
    setDst(id);
    doTrace(srcId, dstId);
  } else {
    // 이미 trace 완료 상태 → 새로운 source로 교체
    clearSel();
    setSrc(id);
  }
}

function setSrc(id) {
  srcId = id; dstId = null;
  clearHL();
  hlNode(id, 'src-sel');
  updSel();
  showInfo(nodeMap[id]); showTab('info');
  document.getElementById('bclear').style.display = 'inline';
}

function setDst(id) {
  dstId = id;
  hlNode(id, 'dst-sel');
  updSel();
}

// 우클릭 메뉴
function showCtx(e, id) {
  e.preventDefault(); e.stopPropagation();
  if (!TRACEABLE.has(nodeMap[id]?.type)) return;
  ctxNodeId = id;
  const m = document.getElementById('ctx');
  m.style.display = 'block';
  m.style.left = e.pageX + 'px';
  m.style.top = e.pageY + 'px';
}
function hideCtx() { document.getElementById('ctx').style.display = 'none'; }

function ctxDo(action) {
  hideCtx();
  if (!ctxNodeId) return;
  if (action === 'src') { setSrc(ctxNodeId); }
  else if (action === 'dst' && srcId) { setDst(ctxNodeId); doTrace(srcId, dstId); }
  else if (action === 'mem') { setSrc(ctxNodeId); setDst('mc_0'); doTrace(srcId, 'mc_0'); }
  else if (action === 'swap' && srcId && dstId) {
    const s = srcId, d = dstId;
    clearSel(); setSrc(d); setDst(s); doTrace(d, s);
  }
  else if (action === 'info') { showInfo(nodeMap[ctxNodeId]); showTab('info'); }
}

// 검색
function searchDev(q) {
  document.querySelectorAll('.htree-node').forEach(el => {
    el.classList.remove('search-hl', 'search-dim');
  });
  if (!q) return;
  q = q.toLowerCase();
  document.querySelectorAll('.htree-node').forEach(el => {
    const id = el.dataset.id || '';
    const label = el.querySelector('.htree-label')?.textContent || '';
    const match = label.toLowerCase().includes(q) || id.toLowerCase().includes(q);
    el.classList.add(match ? 'search-hl' : 'search-dim');
  });
}

// === Trace ===
async function doTrace(sid, did) {
  const r = await fetch(`/api/trace?source=${sid}&destination=${did}`).then(r=>r.json());
  lastTrace = r;

  // 노드 하이라이트
  clearHL();
  hlNode(sid, 'src-sel');
  hlNode(did, 'dst-sel');
  if (r.path?.length > 0) {
    r.path.forEach(nid => { if(nid!==sid&&nid!==did) hlNode(nid,'on-path'); });
    // Edge 하이라이트
    for (let i = 0; i < r.path.length - 1; i++) {
      hlEdge(r.path[i], r.path[i+1], 'trace-hl');
    }
  }

  hist.unshift({sn:r.source_name,dn:r.destination_name,bw:r.e2e_bandwidth_gbps,lat:r.e2e_latency_ns,sid,did,r});
  if(hist.length>10) hist.pop();
  renderTrace(r); showTab('trace');
}

function renderTrace(r) {
  if(!r.segments?.length){setSB('<div class="empty">No path found</div>');return;}
  const ns=r.same_numa?'<span style="color:#22c55e">same</span>':'<span style="color:#f59e0b">cross</span>';
  let h='<div class="section"><div class="stitle">'+r.source_name+' → '+r.destination_name+'</div>';
  h+='<div class="cards">';
  h+=`<div class="card"><div class="card-l">BW</div><div class="card-v">${r.e2e_bandwidth_gbps} GB/s</div></div>`;
  h+=`<div class="card"><div class="card-l">Latency</div><div class="card-v">${r.e2e_latency_ns}ns</div></div>`;
  h+=`<div class="card"><div class="card-l">NUMA</div><div class="card-v" style="font-size:12px">${ns}</div></div>`;
  h+='</div>';
  if(r.bottleneck)h+=`<div style="color:#e94560;font-size:10px;margin-bottom:8px;">⚠ ${r.bottleneck}</div>`;
  h+='</div>';

  h+='<div class="section"><div class="stitle">Path</div>';
  for(let i=0;i<r.segments.length;i++){
    const s=r.segments[i], bn=r.bottleneck&&s.from_name&&r.bottleneck.includes(s.from_name);
    if(i===0)h+=`<div class="pnode src" onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()">${s.from_name}</div>`;
    const lt=(s.link_type||'').includes('pcie')?'PCIe':(s.link_type||'').includes('memory')?'DDR':'→';
    const bw=s.effective_bw_gbps?` ${s.effective_bw_gbps}/${s.theoretical_bw_gbps} GB/s`:'';
    h+=`<div class="plink" onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()"><b>${i+1}</b> ${lt} · ${s.latency_ns}ns${bw} ${bn?'<span style="color:#e94560">◄ BN</span>':''}</div>`;
    h+=`<div class="pnode ${i===r.segments.length-1?'dst':''}" onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()">${s.to_name}</div>`;
  }
  h+='</div>';

  h+='<div class="section"><div class="stitle">Breakdown</div>';
  h+='<table class="tbl"><tr><th>#</th><th>Segment</th><th>Theo</th><th>Eff</th><th>Lat</th></tr>';
  for(let i=0;i<r.segments.length;i++){
    const s=r.segments[i], bn=r.bottleneck&&s.from_name&&r.bottleneck.includes(s.from_name);
    h+=`<tr ${bn?'style="color:#e94560"':''} onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()">`;
    h+=`<td>${i+1}</td><td>${s.from_name}→${s.to_name}</td><td>${s.theoretical_bw_gbps||'-'}</td><td>${s.effective_bw_gbps||'-'}</td><td>${s.latency_ns}ns</td></tr>`;
  }
  h+=`<tr style="border-top:2px solid #333"><td></td><td><b>E2E</b></td><td></td><td><b>${r.e2e_bandwidth_gbps}</b></td><td><b>${r.e2e_latency_ns}ns</b></td></tr>`;
  h+='</table></div>';
  setSB(h);
}

// === Breakdown ↔ 트리 연동 ===
function hlSeg(i) {
  if (!lastTrace?.path || i >= lastTrace.path.length - 1) return;
  const from = lastTrace.path[i], to = lastTrace.path[i+1];
  // 노드 강조
  hlNode(from, 'on-path'); hlNode(to, 'on-path');
  // Edge 강조
  hlEdge(from, to, 'seg-hl');
  // 테이블 행 강조
  document.querySelectorAll('.tbl tr').forEach((tr, idx) => { if(idx===i+1) tr.classList.add('hl'); });
}

function unhlSeg() {
  document.querySelectorAll('.seg-hl').forEach(el => el.classList.remove('seg-hl'));
  document.querySelectorAll('.tbl tr.hl').forEach(el => el.classList.remove('hl'));
  // on-path 복원
  document.querySelectorAll('.htree-node.on-path').forEach(el => {
    if (!el.classList.contains('src-sel') && !el.classList.contains('dst-sel')) el.classList.remove('on-path');
  });
  if (lastTrace?.path) {
    lastTrace.path.forEach(nid => { if(nid!==srcId&&nid!==dstId) hlNode(nid,'on-path'); });
  }
}

// === 노드/Edge 하이라이트 ===
function hlNode(id, cls) {
  const el = document.getElementById('n_'+esc(id));
  if (el) el.classList.add(cls);
}

function hlEdge(fromId, toId, cls) {
  let el = document.getElementById(`e_${esc(fromId)}_${esc(toId)}`);
  if (!el) el = document.getElementById(`e_${esc(toId)}_${esc(fromId)}`);
  if (el) el.classList.add(cls);
}

function clearHL() {
  document.querySelectorAll('.htree-node').forEach(el => el.classList.remove('src-sel','dst-sel','on-path'));
  document.querySelectorAll('.edge-line').forEach(el => el.classList.remove('trace-hl','seg-hl'));
}

function clearSel() {
  srcId=null; dstId=null; lastTrace=null;
  clearHL(); updSel();
  document.getElementById('bclear').style.display='none';
}

function updSel() {
  const bar=document.getElementById('sel-bar'), txt=document.getElementById('sel-text');
  if(!srcId) { bar.style.display='none'; return; }
  bar.style.display='block';
  const sn=nodeMap[srcId]?.label||srcId;
  if(!dstId) txt.innerHTML=`<span style="color:#22c55e;font-weight:bold">SRC: ${sn}</span> <span style="color:#666">→ click destination...</span>`;
  else { const dn=nodeMap[dstId]?.label||dstId; txt.innerHTML=`<span style="color:#22c55e;font-weight:bold">${sn}</span> <span style="color:#666">→</span> <span style="color:#f59e0b;font-weight:bold">${dn}</span>`; }
}

// === Sidebar ===
function showInfo(d) {
  if(!d) return;
  let h=`<div class="section"><div class="stitle">${d.label||d.id}</div>`;
  for(const[k,v]of Object.entries(d)){
    if(['id','label','source','target','parent'].includes(k))continue;
    if(v===null||v===undefined||v===''||v===-1)continue;
    h+=`<div class="field"><span class="flabel">${k}</span><br><span class="fval">${typeof v==='object'?JSON.stringify(v):v}</span></div>`;
  }
  h+='</div>';setSB(h);
}

function showHistory(){
  if(!hist.length){setSB('<div class="empty">No history</div>');return;}
  let h='<div class="section"><div class="stitle">History</div>';
  hist.forEach((t,i)=>{h+=`<div class="hist" onclick="replay(${i})"><span>${t.sn} → ${t.dn}</span><span style="color:#06b6d4">${t.bw} GB/s · ${t.lat}ns</span></div>`;});
  h+='</div>';setSB(h);
}

function replay(i){
  const t=hist[i]; clearSel();
  srcId=t.sid; dstId=t.did; lastTrace=t.r;
  hlNode(t.sid,'src-sel'); hlNode(t.did,'dst-sel');
  if(t.r.path) {
    t.r.path.forEach(nid=>{if(nid!==t.sid&&nid!==t.did)hlNode(nid,'on-path');});
    for(let j=0;j<t.r.path.length-1;j++) hlEdge(t.r.path[j],t.r.path[j+1],'trace-hl');
  }
  updSel(); renderTrace(t.r); showTab('trace');
  document.getElementById('bclear').style.display='inline';
}

function showTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.textContent.toLowerCase()===t));
  if(t==='history')showHistory();
  else if(t==='trace'&&hist.length)renderTrace(hist[0].r);
}
function setSB(h){document.getElementById('sb').innerHTML=h;}

// === Zoom ===
let zoomScale=1;
function setZoom(s){ zoomScale=Math.max(0.2,Math.min(2,s)); document.getElementById('tree-content').style.transform=`scale(${zoomScale})`; document.getElementById('zoom-level').textContent=`${Math.round(zoomScale*100)}%`; }
function zoomIn(){setZoom(zoomScale+0.1);} function zoomOut(){setZoom(zoomScale-0.1);}
function zoomFit(){ const p=document.getElementById('tree-panel'),c=document.getElementById('tree-content'); if(!c.firstChild)return; c.style.transform='scale(1)'; const s=Math.min((p.clientWidth-40)/c.scrollWidth,(p.clientHeight-40)/c.scrollHeight,1); setZoom(s); }
document.getElementById('tree-panel').addEventListener('wheel',function(e){if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(zoomScale+(e.deltaY>0?-0.05:0.05));}},{passive:false});

init();
</script>
