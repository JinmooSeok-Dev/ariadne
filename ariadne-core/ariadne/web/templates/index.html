<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ariadne — System Topology</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #eee; }

    #header {
      padding: 10px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #header h1 { font-size: 18px; color: #e94560; }
    #header .hostname { color: #888; font-size: 14px; }
    #header .stats { color: #666; font-size: 12px; margin-left: auto; }
    #header button {
      padding: 5px 14px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    #main { display: flex; height: calc(100vh - 44px); }

    #graph-container { flex: 1; position: relative; overflow: hidden; }

    #sidebar {
      width: 380px;
      background: #1a1a2e;
      border-left: 1px solid #333;
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    #sidebar.active { display: block; }
    #sidebar h2 { font-size: 14px; color: #e94560; margin-bottom: 10px; }
    #sidebar .field { margin-bottom: 6px; }
    #sidebar .label { color: #666; font-size: 11px; }
    #sidebar .value { color: #ddd; font-size: 13px; }

    #trace-panel {
      position: absolute;
      bottom: 0; left: 0; right: 360px;
      background: #1a1a2e;
      border-top: 2px solid #e94560;
      padding: 14px 24px;
      display: none;
      max-height: 35vh;
      overflow-y: auto;
    }
    #trace-panel.active { display: block; }
    #trace-panel h3 { font-size: 13px; color: #e94560; margin-bottom: 8px; }
    #trace-panel table { width: 100%; border-collapse: collapse; }
    #trace-panel th, #trace-panel td {
      padding: 4px 8px; text-align: left; font-size: 11px; border-bottom: 1px solid #333;
    }
    #trace-panel th { color: #888; }
    .bottleneck { color: #e94560; font-weight: bold; }

    .numa-group { fill: rgba(240, 192, 64, 0.06); stroke: #f0c040; stroke-width: 1.5; stroke-dasharray: 6,3; rx: 12; }
    .numa-label { fill: #f0c040; font-size: 13px; font-weight: bold; }

    .node-rect { rx: 6; cursor: pointer; stroke-width: 1.5; }
    .node-rect:hover { filter: brightness(1.3); }
    .node-label { font-size: 10px; fill: #ddd; pointer-events: none; text-anchor: middle; }
    .node-sublabel { font-size: 9px; fill: #888; pointer-events: none; text-anchor: middle; }

    .link-line { stroke-opacity: 0.5; fill: none; }
    .link-bw { font-size: 8px; fill: #888; text-anchor: middle; }

    .trace-path { stroke: #e94560 !important; stroke-opacity: 1 !important; stroke-width: 3 !important; }
    .node-selected .node-rect { stroke: #e94560 !important; stroke-width: 3 !important; }

    .tooltip {
      position: absolute;
      background: #1a1a2e;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 300px;
    }

    #legend {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(26, 26, 46, 0.95);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 11px;
    }
    #legend .item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    #legend .swatch { width: 14px; height: 10px; border-radius: 2px; }

    #instructions {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 46, 0.9);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Ariadne</h1>
    <span class="hostname" id="hostname"></span>
    <span class="stats" id="stats"></span>
    <button onclick="reloadTopology()">Reload</button>
  </div>

  <div id="main">
    <div id="graph-container">
      <svg id="graph"></svg>
      <div id="legend"></div>
      <div class="tooltip" id="tooltip"></div>
      <div id="instructions">Click node to inspect · Click two nodes to trace · Scroll to zoom · Drag to pan</div>
      <div id="trace-panel"></div>
    </div>
    <div id="sidebar"></div>
  </div>

  <script>
    const COLORS = {
      numa_node: '#f0c040',
      socket: '#4ecdc4',
      memory_controller: '#3b82f6',
      pcie_root_complex: '#e94560',
      pcie_root_port: '#7c3aed',
      gpu: '#22c55e',
      npu: '#06b6d4',
      nic: '#a855f7',
      nvme: '#f59e0b',
      pcie_endpoint: '#6b7280',
    };

    const LABELS = {
      numa_node: 'NUMA',
      socket: 'Socket',
      memory_controller: 'Mem Ctrl',
      pcie_root_complex: 'Root Complex',
      pcie_root_port: 'Root Port',
      gpu: 'GPU',
      npu: 'NPU',
      nic: 'NIC',
      nvme: 'NVMe',
      pcie_endpoint: 'Device',
    };

    const LAYERS = {
      numa_node: 0,
      socket: 1,
      memory_controller: 1,
      pcie_root_complex: 2,
      pcie_root_port: 3,
      gpu: 4, npu: 4, nic: 4, nvme: 4, pcie_endpoint: 4,
    };

    const NODE_W = { default: 120, pcie_root_port: 24, memory_controller: 100 };
    const NODE_H = { default: 44, pcie_root_port: 20, memory_controller: 36 };
    const LAYER_GAP = 100;
    const NODE_GAP = 16;

    let graphData = null;
    let selectedNodes = [];

    async function loadTopology() {
      const resp = await fetch('/api/topology/graph');
      graphData = await resp.json();
      const topoResp = await fetch('/api/topology');
      const topo = await topoResp.json();
      document.getElementById('hostname').textContent = topo.hostname;
      document.getElementById('stats').textContent =
        `${topo.numa_nodes.length} NUMA · ${topo.cpu_cores.length} cores · ${topo.pci_devices.length} PCI devices`;
      renderHierarchy(graphData);
      renderLegend();
    }

    function renderHierarchy(data) {
      const container = document.getElementById('graph-container');
      const svgW = container.clientWidth;
      const svgH = container.clientHeight;

      d3.select('#graph').selectAll('*').remove();
      const svg = d3.select('#graph').attr('width', svgW).attr('height', svgH);
      const g = svg.append('g');

      svg.call(d3.zoom().scaleExtent([0.2, 3]).on('zoom', e => g.attr('transform', e.transform)));

      const adjacency = {};
      data.links.forEach(l => {
        if (!adjacency[l.source]) adjacency[l.source] = [];
        if (!adjacency[l.target]) adjacency[l.target] = [];
        adjacency[l.source].push(l.target);
        adjacency[l.target].push(l.source);
      });

      const layers = {};
      data.nodes.forEach(n => {
        const layer = LAYERS[n.type] ?? 4;
        if (!layers[layer]) layers[layer] = [];
        layers[layer].push(n);
      });

      const positions = {};
      const startY = 60;

      Object.keys(layers).sort((a, b) => a - b).forEach(layerIdx => {
        const nodes = layers[layerIdx];
        const y = startY + layerIdx * LAYER_GAP;

        if (parseInt(layerIdx) >= 3) {
          nodes.sort((a, b) => {
            const pa = _findParent(a.id, data.links);
            const pb = _findParent(b.id, data.links);
            const pxa = positions[pa] ? positions[pa].x : 0;
            const pxb = positions[pb] ? positions[pb].x : 0;
            return pxa - pxb;
          });
        }

        const totalW = nodes.reduce((sum, n) => {
          return sum + (NODE_W[n.type] || NODE_W.default) + NODE_GAP;
        }, -NODE_GAP);
        let x = (svgW - totalW) / 2;

        nodes.forEach(n => {
          const w = NODE_W[n.type] || NODE_W.default;
          positions[n.id] = { x: x + w / 2, y, w, h: NODE_H[n.type] || NODE_H.default };
          x += w + NODE_GAP;
        });
      });

      const numaNodes = data.nodes.filter(n => n.type === 'numa_node');
      if (numaNodes.length > 0) {
        numaNodes.forEach(numa => {
          const children = _findDescendants(numa.id, data.links, positions);
          if (children.length === 0) return;
          const allPos = [positions[numa.id], ...children.map(id => positions[id]).filter(Boolean)];
          const minX = Math.min(...allPos.map(p => p.x - (p.w || 60))) - 20;
          const maxX = Math.max(...allPos.map(p => p.x + (p.w || 60))) + 20;
          const minY = Math.min(...allPos.map(p => p.y)) - 30;
          const maxY = Math.max(...allPos.map(p => p.y + (p.h || 40))) + 20;

          g.append('rect')
            .attr('class', 'numa-group')
            .attr('x', minX).attr('y', minY)
            .attr('width', maxX - minX).attr('height', maxY - minY);
          g.append('text')
            .attr('class', 'numa-label')
            .attr('x', minX + 10).attr('y', minY + 16)
            .text(numa.name + (numa.attrs?.memory_mb ? ` (${Math.round(numa.attrs.memory_mb / 1024)}GB)` : ''));
        });
      }

      const linkGroup = g.append('g');
      const linkElements = linkGroup.selectAll('line')
        .data(data.links.filter(l => positions[l.source] && positions[l.target]))
        .join('line')
        .attr('class', 'link-line')
        .attr('x1', d => positions[d.source].x)
        .attr('y1', d => positions[d.source].y + (positions[d.source].h || 40) / 2)
        .attr('x2', d => positions[d.target].x)
        .attr('y2', d => positions[d.target].y - (positions[d.target].h || 40) / 2)
        .attr('stroke', d => d.type === 'pcie' ? '#e9456088' : '#ffffff22')
        .attr('stroke-width', d => {
          if (!d.bandwidth_gbps) return 1;
          return Math.max(1, Math.min(5, d.bandwidth_gbps / 8));
        })
        .attr('stroke-dasharray', d => d.type === 'internal' ? '3,3' : null);

      linkGroup.selectAll('text')
        .data(data.links.filter(l => l.bandwidth_gbps && positions[l.source] && positions[l.target]))
        .join('text')
        .attr('class', 'link-bw')
        .attr('x', d => (positions[d.source].x + positions[d.target].x) / 2)
        .attr('y', d => (positions[d.source].y + positions[d.target].y) / 2 + 12)
        .text(d => `${d.bandwidth_gbps} GB/s`);

      const nodeGroup = g.append('g');
      const nodeElements = nodeGroup.selectAll('g')
        .data(data.nodes.filter(n => positions[n.id] && n.type !== 'numa_node'))
        .join('g')
        .attr('transform', d => {
          const p = positions[d.id];
          return `translate(${p.x - p.w / 2}, ${p.y - p.h / 2})`;
        });

      nodeElements.append('rect')
        .attr('class', 'node-rect')
        .attr('width', d => positions[d.id].w)
        .attr('height', d => positions[d.id].h)
        .attr('fill', d => COLORS[d.type] || '#666')
        .attr('stroke', d => d3.color(COLORS[d.type] || '#666').brighter(0.5))
        .attr('opacity', 0.85);

      nodeElements.append('text')
        .attr('class', 'node-label')
        .attr('x', d => positions[d.id].w / 2)
        .attr('y', d => d.type === 'pcie_root_port' ? positions[d.id].h / 2 + 3 : 16)
        .text(d => {
          if (d.type === 'pcie_root_port') return '';
          const name = d.name;
          const maxLen = Math.floor((positions[d.id].w - 8) / 6);
          return name.length > maxLen ? name.slice(0, maxLen - 1) + '…' : name;
        });

      nodeElements.filter(d => d.type !== 'pcie_root_port')
        .append('text')
        .attr('class', 'node-sublabel')
        .attr('x', d => positions[d.id].w / 2)
        .attr('y', d => 30)
        .text(d => {
          if (d.attrs?.bdf) return d.attrs.bdf;
          return LABELS[d.type] || '';
        });

      nodeElements
        .on('click', (event, d) => {
          event.stopPropagation();
          handleNodeClick(d, nodeElements, linkElements);
        })
        .on('mouseover', (event, d) => showTooltip(event, d))
        .on('mouseout', hideTooltip);

      svg.on('click', () => clearSelection(nodeElements, linkElements));
    }

    function _findParent(nodeId, links) {
      for (const l of links) {
        if (l.target === nodeId) return l.source;
      }
      return null;
    }

    function _findDescendants(nodeId, links, positions) {
      const result = new Set();
      const queue = [nodeId];
      while (queue.length > 0) {
        const current = queue.shift();
        for (const l of links) {
          if (l.source === current && !result.has(l.target) && positions[l.target]) {
            result.add(l.target);
            queue.push(l.target);
          }
        }
      }
      return [...result];
    }

    function handleNodeClick(d, nodeSelection, linkSelection) {
      selectedNodes.push(d);
      if (selectedNodes.length === 1) {
        showNodeInfo(d);
        nodeSelection.classed('node-selected', n => n.id === d.id);
      }
      if (selectedNodes.length === 2) {
        tracePath(selectedNodes[0].id, selectedNodes[1].id, nodeSelection, linkSelection);
        selectedNodes = [];
      }
    }

    async function tracePath(src, dst, nodeSelection, linkSelection) {
      const resp = await fetch(`/api/trace?source=${src}&destination=${dst}`);
      const result = await resp.json();

      linkSelection.classed('trace-path', false);
      nodeSelection.classed('node-selected', false);

      if (result.path?.length > 1) {
        const pathSet = new Set(result.path);
        nodeSelection.classed('node-selected', n => pathSet.has(n.id));
        const edges = new Set();
        for (let i = 0; i < result.path.length - 1; i++) {
          edges.add(`${result.path[i]}|${result.path[i+1]}`);
          edges.add(`${result.path[i+1]}|${result.path[i]}`);
        }
        linkSelection.classed('trace-path', l => edges.has(`${l.source}|${l.target}`) || edges.has(`${l.target}|${l.source}`));
      }
      showTraceResult(result);
    }

    function showNodeInfo(d) {
      const sb = document.getElementById('sidebar');
      sb.classList.add('active');
      let html = `<h2>${d.name}</h2>`;
      html += `<div class="field"><span class="label">Type</span><br><span class="value">${LABELS[d.type] || d.type}</span></div>`;
      if (d.attrs) {
        for (const [k, v] of Object.entries(d.attrs)) {
          if (v === null || v === undefined || v === '' || v === -1) continue;
          const display = typeof v === 'object' ? JSON.stringify(v) : v;
          html += `<div class="field"><span class="label">${k}</span><br><span class="value">${display}</span></div>`;
        }
      }
      html += `<br><div style="color:#666;font-size:11px;">Click another node to trace path</div>`;
      sb.innerHTML = html;
    }

    function showTraceResult(result) {
      const panel = document.getElementById('trace-panel');
      panel.classList.add('active');
      let html = `<h3>${result.source_name} → ${result.destination_name}</h3>`;
      if (result.segments?.length) {
        html += '<table><tr><th>Segment</th><th>Theo BW</th><th>Eff BW</th><th>Latency</th></tr>';
        for (const s of result.segments) {
          html += `<tr><td>${s.from_name} → ${s.to_name}</td>`;
          html += `<td>${s.theoretical_bw_gbps ? s.theoretical_bw_gbps + ' GB/s' : 'internal'}</td>`;
          html += `<td>${s.effective_bw_gbps ? s.effective_bw_gbps + ' GB/s' : '—'}</td>`;
          html += `<td>${s.latency_ns}ns</td></tr>`;
        }
        html += `<tr style="border-top:2px solid #555"><td><b>E2E</b></td><td></td>`;
        html += `<td><b>${result.e2e_bandwidth_gbps} GB/s</b></td><td><b>${result.e2e_latency_ns}ns</b></td></tr>`;
        if (result.bottleneck) html += `<tr><td class="bottleneck">Bottleneck</td><td colspan="3" class="bottleneck">${result.bottleneck}</td></tr>`;
        html += '</table>';
        html += result.same_numa ? '<p style="color:#22c55e;margin-top:6px;">✅ same-NUMA</p>' : '<p style="color:#f59e0b;margin-top:6px;">⚠️ cross-NUMA</p>';
      } else {
        html += '<p style="color:#e94560;">No path found</p>';
      }
      panel.innerHTML = html;
    }

    function clearSelection(nodeSelection, linkSelection) {
      selectedNodes = [];
      nodeSelection.classed('node-selected', false);
      linkSelection.classed('trace-path', false);
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('trace-panel').classList.remove('active');
    }

    function showTooltip(event, d) {
      const t = document.getElementById('tooltip');
      let html = `<b>${d.name}</b><br>${LABELS[d.type] || d.type}`;
      if (d.attrs?.bandwidth_gbps) html += `<br>${d.attrs.bandwidth_gbps} GB/s`;
      if (d.attrs?.link) html += `<br>${d.attrs.link}`;
      if (d.attrs?.iommu_group >= 0) html += `<br>IOMMU Group: ${d.attrs.iommu_group}`;
      if (d.attrs?.bars) html += `<br>${d.attrs.bars}`;
      t.innerHTML = html;
      t.style.display = 'block';
      t.style.left = (event.pageX + 14) + 'px';
      t.style.top = (event.pageY - 10) + 'px';
    }
    function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

    function renderLegend() {
      const types = ['numa_node', 'socket', 'memory_controller', 'pcie_root_complex', 'pcie_root_port', 'gpu', 'npu', 'nvme', 'nic'];
      document.getElementById('legend').innerHTML = types.map(t =>
        `<div class="item"><div class="swatch" style="background:${COLORS[t]}"></div>${LABELS[t]}</div>`
      ).join('');
    }

    async function reloadTopology() {
      await fetch('/api/topology/reload', { method: 'POST' });
      await loadTopology();
    }

    loadTopology();
  </script>
</body>
</html>
