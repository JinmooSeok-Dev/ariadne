<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ariadne</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f0f1a; color:#eee; overflow:hidden; }

    #header { height:40px; padding:0 16px; background:#1a1a2e; border-bottom:1px solid #333; display:flex; align-items:center; gap:12px; }
    #header h1 { font-size:15px; color:#e94560; }
    .info { color:#666; font-size:11px; }
    .spacer { flex:1; }
    .btn { padding:4px 12px; border-radius:4px; font-size:11px; cursor:pointer; border:none; font-weight:bold; }
    .btn-gray { background:#333; color:#ccc; }

    #main { display:flex; height:calc(100vh - 40px); }

    /* Horizontal Tree */
    #tree-panel { flex:1; overflow:auto; padding:20px; }

    .htree { display:flex; align-items:center; }
    .htree-node {
      display:inline-flex; align-items:center; gap:4px;
      padding:5px 10px; border-radius:5px; cursor:pointer;
      white-space:nowrap; font-size:11px;
      border:1.5px solid transparent;
      flex-shrink:0;
      min-width:160px;
    }
    .htree-node:hover { filter:brightness(1.3); }
    .htree-node.src-sel { border-color:#22c55e !important; }
    .htree-node.dst-sel { border-color:#f59e0b !important; }
    .htree-node.on-path { border-color:#e94560 !important; }

    .htree-toggle { font-size:9px; color:#aaa; cursor:pointer; width:14px; text-align:center; flex-shrink:0; user-select:none; }
    .htree-toggle:hover { color:#fff; }
    .htree-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
    .htree-count { font-size:8px; color:#fff; background:#e94560; padding:0 5px; border-radius:8px; margin-left:4px; }
    .htree-children.folded { display:none; }
    .htree-connector.folded { display:none; }
    .htree-label { font-weight:500; }
    .htree-badge { font-size:8px; color:#ccc; background:rgba(255,255,255,0.08); padding:1px 5px; border-radius:3px; }
    .htree-bw { font-size:8px; color:#22d3ee; font-weight:bold; }
    .htree-iommu { font-size:8px; color:#fbbf24; font-weight:bold; }

    /* Parent → children 연결 */
    .htree-connector { width:36px; border-top:2.5px solid #aaa; flex-shrink:0; }

    /* Children 컨테이너: 왼쪽 세로선 */
    .htree-children {
      display:flex; flex-direction:column;
      border-left:2.5px solid #aaa;
      padding:4px 0;
      gap:2px;
    }

    /* 각 child → 가로선 + 재귀 */
    .htree-child {
      display:flex; align-items:center;
      padding:2px 0;
    }
    .htree-hline {
      width:32px; border-top:2.5px solid #aaa; flex-shrink:0;
      position:relative;
    }
    .htree-hline.pcie { border-color:#ff6b81; border-top-width:3px; }
    .htree-hline.internal { border-color:#aaa; border-top-style:dashed; }
    .htree-bw-label {
      font-size:8px; color:#22d3ee; font-weight:bold; position:absolute;
      top:-12px; left:4px; white-space:nowrap;
    }

    /* Sidebar */
    #sidebar { width:380px; background:#1a1a2e; border-left:1px solid #333; display:flex; flex-direction:column; }
    .tabs { display:flex; border-bottom:1px solid #333; }
    .tab { flex:1; padding:8px; text-align:center; font-size:11px; cursor:pointer; color:#666; border-bottom:2px solid transparent; font-weight:bold; }
    .tab.on { color:#e94560; border-bottom-color:#e94560; }
    #sb { flex:1; overflow-y:auto; padding:12px; }

    .section { margin-bottom:14px; }
    .stitle { font-size:11px; color:#e94560; font-weight:bold; margin-bottom:6px; border-bottom:1px solid #222; padding-bottom:3px; }
    .field { margin-bottom:3px; }
    .flabel { font-size:9px; color:#666; }
    .fval { font-size:11px; color:#ddd; }

    .cards { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
    .card { flex:1; min-width:70px; background:#0f0f1a; border:1px solid #222; border-radius:5px; padding:6px; text-align:center; }
    .card-l { font-size:8px; color:#666; text-transform:uppercase; }
    .card-v { font-size:16px; font-weight:bold; color:#06b6d4; }

    .pnode { font-size:10px; padding:4px 8px; background:#0f0f1a; border-left:3px solid #444; border-radius:0 3px 3px 0; margin:1px 0; }
    .pnode.src { border-left-color:#22c55e; }
    .pnode.dst { border-left-color:#f59e0b; }
    .plink { font-size:9px; color:#777; padding:1px 0 1px 14px; border-left:1px dashed #333; margin-left:4px; }

    .tbl { width:100%; border-collapse:collapse; font-size:10px; }
    .tbl th { color:#666; font-size:8px; text-transform:uppercase; padding:3px 4px; text-align:left; border-bottom:1px solid #333; }
    .tbl td { padding:3px 4px; border-bottom:1px solid #1a1a2e; }
    .tbl tr:hover { background:rgba(233,69,96,0.08); }
    .tbl tr.hl { background:rgba(255,255,255,0.06); }

    .hist { padding:6px 8px; border-radius:3px; font-size:10px; cursor:pointer; margin:2px 0; display:flex; justify-content:space-between; background:#0f0f1a; border-left:3px solid #333; }
    .hist:hover { border-left-color:#e94560; background:#1a1a2e; }

    #sel-bar { position:fixed; top:48px; left:50%; transform:translateX(-50%); background:rgba(20,20,40,0.95); padding:6px 14px; border-radius:6px; font-size:12px; z-index:5; display:none; }
    .empty { color:#999; font-size:12px; padding:20px; text-align:center; line-height:1.8; }
  </style>
</head>
<body>
<div id="header">
  <h1>Ariadne</h1>
  <span class="info" id="hinfo"></span>
  <div class="spacer"></div>
  <button class="btn btn-gray" id="bclear" style="display:none" onclick="clearSel()">Clear (ESC)</button>
  <button class="btn btn-gray" onclick="location.reload()">Reload</button>
</div>
<div id="sel-bar"><span id="sel-text"></span></div>

<div id="main">
  <div id="tree-panel"></div>
  <div id="sidebar">
    <div class="tabs">
      <div class="tab on" onclick="showTab('trace')">Trace</div>
      <div class="tab" onclick="showTab('info')">Info</div>
      <div class="tab" onclick="showTab('history')">History</div>
    </div>
    <div id="sb">
      <div class="empty">
        Click a device to set as <span style="color:#22c55e">Source</span><br>
        then click another as <span style="color:#f59e0b">Destination</span><br><br>
        <span style="color:#444">ESC to clear</span>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = {
  numa_node:'#f0c040', socket:'#4ecdc4', memory_controller:'#3b82f6',
  pcie_root_complex:'#e94560', pcie_root_port:'#7c3aed',
  gpu:'#22c55e', npu:'#06b6d4', nic:'#a855f7', nvme:'#f59e0b', pcie_endpoint:'#6b7280',
};
const TRACEABLE = new Set(['gpu','npu','nvme','nic','memory_controller','pcie_endpoint']);

let graph=null, topo=null;
let srcId=null, dstId=null, hist=[];

async function init() {
  [graph, topo] = await Promise.all([
    fetch('/api/topology/graph').then(r=>r.json()),
    fetch('/api/topology').then(r=>r.json()),
  ]);
  document.getElementById('hinfo').textContent =
    `${topo.hostname} · ${topo.numa_nodes.length} NUMA · ${topo.cpu_cores.length} cores · ${topo.pci_devices.length} PCI`;
  renderTree();
  document.addEventListener('keydown', e => { if(e.key==='Escape') clearSel(); });
}

function renderTree() {
  const nodeMap = {};
  graph.nodes.forEach(n => nodeMap[n.data.id] = n.data);

  const childrenOf = {};
  const hasParent = new Set();
  graph.edges.forEach(e => {
    if (!childrenOf[e.data.source]) childrenOf[e.data.source] = [];
    childrenOf[e.data.source].push(e.data);
    hasParent.add(e.data.target);
  });

  const roots = graph.nodes.filter(n => !hasParent.has(n.data.id)).map(n => n.data.id);
  let html = '';
  roots.forEach(r => { html += buildNode(r, nodeMap, childrenOf); });
  document.getElementById('tree-panel').innerHTML = html;
}

function buildNode(id, nodeMap, childrenOf) {
  const node = nodeMap[id];
  if (!node) return '';
  const kids = childrenOf[id] || [];
  const color = COLORS[node.type] || '#666';
  const nid = id.replace(/[:.]/g, '_');

  let badges = '';
  if (node.link) badges += `<span class="htree-badge">${node.link}</span>`;
  if (node.iommu_group >= 0) badges += `<span class="htree-iommu">G${node.iommu_group}</span>`;
  if (node.sriov_totalvfs > 0) badges += `<span class="htree-badge">VF:${node.sriov_numvfs||0}/${node.sriov_totalvfs}</span>`;
  if (node.memory_mb) badges += `<span class="htree-badge">${Math.round(node.memory_mb/1024)}GB</span>`;
  if (node.cpu_count) badges += `<span class="htree-badge">${node.cpu_count}CPU</span>`;

  const totalDescendants = countDescendants(id, childrenOf);
  const childrenId = `ch_${nid}`;
  const connId = `conn_${nid}`;

  let h = `<div class="htree">`;

  // 노드 박스
  h += `<div class="htree-node" id="n_${nid}" data-id="${id}" style="background:${color}22;border-color:${color}44" onclick="clickNode('${id}')">`;
  if (kids.length > 0) {
    h += `<span class="htree-toggle" onclick="event.stopPropagation();toggleFold('${childrenId}','${connId}',this)">▼</span>`;
  }
  h += `<span class="htree-dot" style="background:${color}"></span>`;
  h += `<span class="htree-label">${node.label}</span>`;
  h += badges;
  if (kids.length > 0) {
    h += `<span class="htree-count" id="cnt_${nid}" style="display:none">${totalDescendants}</span>`;
  }
  h += `</div>`;

  // 자식이 있으면: 커넥터 + 세로선 + 각 child
  if (kids.length > 0) {
    h += `<div class="htree-connector" id="${connId}"></div>`;
    h += `<div class="htree-children" id="${childrenId}">`;
    kids.forEach(edge => {
      const lineClass = edge.type === 'internal' ? 'internal' : 'pcie';
      h += `<div class="htree-child">`;
      h += `<div class="htree-hline ${lineClass}">`;
      if (edge.bandwidth_gbps) {
        h += `<span class="htree-bw-label">${edge.bandwidth_gbps}</span>`;
      }
      h += `</div>`;
      h += buildNode(edge.target, nodeMap, childrenOf);
      h += `</div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  return h;
}

function countDescendants(id, childrenOf) {
  const kids = childrenOf[id] || [];
  let count = kids.length;
  kids.forEach(edge => { count += countDescendants(edge.target, childrenOf); });
  return count;
}

function toggleFold(childrenId, connId, toggleEl) {
  const ch = document.getElementById(childrenId);
  const conn = document.getElementById(connId);
  if (!ch) return;
  const folding = !ch.classList.contains('folded');
  ch.classList.toggle('folded');
  if (conn) conn.classList.toggle('folded');
  toggleEl.textContent = folding ? '▶' : '▼';

  // 카운트 뱃지 표시/숨김
  const nid = childrenId.replace('ch_','cnt_');
  const cnt = document.getElementById(nid);
  if (cnt) cnt.style.display = folding ? 'inline' : 'none';
}

function clickNode(id) {
  const node = graph.nodes.find(n => n.data.id === id);
  if (!node) return;
  if (TRACEABLE.has(node.data.type)) pickNode(id);
  else { showInfo(node.data); showTab('info'); }
}

function pickNode(id) {
  if (!srcId) {
    srcId = id;
    clearHL();
    hlNode(id, 'src-sel');
    updSel();
    const n = graph.nodes.find(n => n.data.id === id);
    if (n) { showInfo(n.data); showTab('info'); }
  } else if (!dstId && id !== srcId) {
    dstId = id;
    hlNode(id, 'dst-sel');
    updSel();
    doTrace(srcId, dstId);
  }
}

async function doTrace(sid, did) {
  const r = await fetch(`/api/trace?source=${sid}&destination=${did}`).then(r=>r.json());
  if (r.path?.length > 0) {
    r.path.forEach(nid => { if(nid!==sid&&nid!==did) hlNode(nid,'on-path'); });
  }
  hist.unshift({sn:r.source_name,dn:r.destination_name,bw:r.e2e_bandwidth_gbps,lat:r.e2e_latency_ns,sid,did,r});
  if(hist.length>10) hist.pop();
  renderTrace(r); showTab('trace');
  document.getElementById('bclear').style.display='inline';
}

function renderTrace(r) {
  if(!r.segments?.length){setSB('<div class="empty">No path found</div>');return;}
  const ns=r.same_numa?'<span style="color:#22c55e">same</span>':'<span style="color:#f59e0b">cross</span>';
  let h='<div class="section"><div class="stitle">'+r.source_name+' → '+r.destination_name+'</div>';
  h+='<div class="cards">';
  h+=`<div class="card"><div class="card-l">BW</div><div class="card-v">${r.e2e_bandwidth_gbps} GB/s</div></div>`;
  h+=`<div class="card"><div class="card-l">Latency</div><div class="card-v">${r.e2e_latency_ns}ns</div></div>`;
  h+=`<div class="card"><div class="card-l">NUMA</div><div class="card-v" style="font-size:12px">${ns}</div></div>`;
  h+='</div>';
  if(r.bottleneck)h+=`<div style="color:#e94560;font-size:10px;margin-bottom:8px;">⚠ ${r.bottleneck}</div>`;
  h+='</div>';

  h+='<div class="section"><div class="stitle">Path</div>';
  for(let i=0;i<r.segments.length;i++){
    const s=r.segments[i], bn=r.bottleneck&&s.from_name&&r.bottleneck.includes(s.from_name);
    if(i===0)h+=`<div class="pnode src">${s.from_name}</div>`;
    const lt=(s.link_type||'').includes('pcie')?'PCIe':(s.link_type||'').includes('memory')?'DDR':'→';
    const bw=s.effective_bw_gbps?` ${s.effective_bw_gbps}/${s.theoretical_bw_gbps} GB/s`:'';
    h+=`<div class="plink" onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()"><b>${i+1}</b> ${lt} · ${s.latency_ns}ns${bw} ${bn?'<span style="color:#e94560">◄ BN</span>':''}</div>`;
    h+=`<div class="pnode ${i===r.segments.length-1?'dst':''}">${s.to_name}</div>`;
  }
  h+='</div>';

  h+='<div class="section"><div class="stitle">Breakdown</div>';
  h+='<table class="tbl"><tr><th>#</th><th>Segment</th><th>Theo</th><th>Eff</th><th>Lat</th></tr>';
  for(let i=0;i<r.segments.length;i++){
    const s=r.segments[i], bn=r.bottleneck&&s.from_name&&r.bottleneck.includes(s.from_name);
    h+=`<tr ${bn?'style="color:#e94560"':''} onmouseenter="hlSeg(${i})" onmouseleave="unhlSeg()">`;
    h+=`<td>${i+1}</td><td>${s.from_name}→${s.to_name}</td><td>${s.theoretical_bw_gbps||'-'}</td><td>${s.effective_bw_gbps||'-'}</td><td>${s.latency_ns}ns</td></tr>`;
  }
  h+=`<tr style="border-top:2px solid #333"><td></td><td><b>E2E</b></td><td></td><td><b>${r.e2e_bandwidth_gbps}</b></td><td><b>${r.e2e_latency_ns}ns</b></td></tr>`;
  h+='</table></div>';
  setSB(h);
}

function hlSeg(i){
  if(!hist.length)return;
  const r=hist[0].r;
  if(!r.path||i>=r.path.length-1)return;
  hlNode(r.path[i],'on-path');hlNode(r.path[i+1],'on-path');
  document.querySelectorAll('.tbl tr').forEach((tr,idx)=>{if(idx===i+1)tr.classList.add('hl');});
}
function unhlSeg(){
  document.querySelectorAll('.htree-node.on-path').forEach(el=>{
    if(!el.classList.contains('src-sel')&&!el.classList.contains('dst-sel')) el.classList.remove('on-path');
  });
  document.querySelectorAll('.tbl tr.hl').forEach(tr=>tr.classList.remove('hl'));
  // re-apply trace path highlights
  if(hist.length&&hist[0].r.path){
    hist[0].r.path.forEach(nid=>{
      if(nid!==srcId&&nid!==dstId) hlNode(nid,'on-path');
    });
  }
}

function showInfo(d){
  let h=`<div class="section"><div class="stitle">${d.label||d.id}</div>`;
  for(const[k,v]of Object.entries(d)){
    if(['id','label','source','target','parent'].includes(k))continue;
    if(v===null||v===undefined||v===''||v===-1)continue;
    h+=`<div class="field"><span class="flabel">${k}</span><br><span class="fval">${typeof v==='object'?JSON.stringify(v):v}</span></div>`;
  }
  h+='</div>';setSB(h);
}

function showHistory(){
  if(!hist.length){setSB('<div class="empty">No history</div>');return;}
  let h='<div class="section"><div class="stitle">History</div>';
  hist.forEach((t,i)=>{h+=`<div class="hist" onclick="replay(${i})"><span>${t.sn}→${t.dn}</span><span style="color:#06b6d4">${t.bw}GB/s·${t.lat}ns</span></div>`;});
  h+='</div>';setSB(h);
}

function replay(i){
  const t=hist[i]; clearSel();
  srcId=t.sid;dstId=t.did; hlNode(t.sid,'src-sel');hlNode(t.did,'dst-sel');
  if(t.r.path) t.r.path.forEach(nid=>{if(nid!==t.sid&&nid!==t.did)hlNode(nid,'on-path');});
  updSel();renderTrace(t.r);showTab('trace');
  document.getElementById('bclear').style.display='inline';
}

function hlNode(id,cls){const el=document.getElementById('n_'+id.replace(/[:.]/g,'_'));if(el)el.classList.add(cls);}
function clearHL(){document.querySelectorAll('.htree-node').forEach(el=>el.classList.remove('src-sel','dst-sel','on-path'));}
function clearSel(){srcId=null;dstId=null;clearHL();updSel();document.getElementById('bclear').style.display='none';}

function updSel(){
  const bar=document.getElementById('sel-bar'),txt=document.getElementById('sel-text');
  if(!srcId){bar.style.display='none';return;}
  bar.style.display='block';
  const sn=graph.nodes.find(n=>n.data.id===srcId)?.data.label||srcId;
  if(!dstId)txt.innerHTML=`<span style="color:#22c55e;font-weight:bold">SRC:${sn}</span> <span style="color:#666">→ click dest...</span>`;
  else{const dn=graph.nodes.find(n=>n.data.id===dstId)?.data.label||dstId;txt.innerHTML=`<span style="color:#22c55e;font-weight:bold">${sn}</span><span style="color:#666">→</span><span style="color:#f59e0b;font-weight:bold">${dn}</span>`;}
}

function showTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.textContent.toLowerCase()===t));
  if(t==='history')showHistory();
  else if(t==='trace'&&hist.length)renderTrace(hist[0].r);
}
function setSB(h){document.getElementById('sb').innerHTML=h;}

init();
</script>
</body>
</html>
